<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BYRO — The Robot Marketplace</title>
<meta name="description" content="Buy, sell, and service robots. The marketplace for the robot economy.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --cyan: #00B4D8;
  --cyan-dim: #0090ad;
  --cyan-glow: rgba(0, 180, 216, 0.15);
  --orange: #E8530E;
  --orange-dim: rgba(232, 83, 14, 0.6);
  --bg: #0A0A0F;
  --bg-card: #12121A;
  --text: #E8E8EC;
  --text-dim: #6B6B7B;
  --grid-line: rgba(0, 180, 216, 0.04);
  --grid-line-bright: rgba(0, 180, 216, 0.08);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* Circuit grid background */
.grid-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image:
    linear-gradient(var(--grid-line) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line) 1px, transparent 1px),
    linear-gradient(var(--grid-line-bright) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-line-bright) 1px, transparent 1px);
  background-size:
    60px 60px,
    60px 60px,
    300px 300px,
    300px 300px;
  background-position: -1px -1px;
}

/* Radial glow behind logo */
.glow-orb {
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(0, 180, 216, 0.08) 0%, transparent 70%);
  z-index: 0;
  pointer-events: none;
}

/* Scanline overlay */
.scanlines {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.03) 2px,
    rgba(0, 0, 0, 0.03) 4px
  );
}

main {
  position: relative;
  z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 40px 24px;
}

/* Logo */
.logo-container {
  margin-bottom: 64px;
  animation: fadeUp 1s ease-out 0.2s both;
  display: flex;
  justify-content: center;
  width: 100%;
}

.logo-svg {
  width: 320px;
  height: auto;
  display: block;
}

.robot-eye-left, .robot-eye-right {
  animation: blink 4s ease-in-out infinite;
}

.robot-eye-right {
  animation-delay: 0.05s;
}

@keyframes blink {
  0%, 42%, 46%, 100% { transform: scaleY(1); }
  44% { transform: scaleY(0.1); }
}

.visor {
  animation: visorPulse 3s ease-in-out infinite;
}

@keyframes visorPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.85; }
}

/* Headline */
.headline {
  font-size: clamp(20px, 4vw, 32px);
  font-weight: 300;
  letter-spacing: -0.02em;
  text-align: center;
  margin-bottom: 12px;
  color: var(--text-dim);
  animation: fadeUp 1s ease-out 0.5s both;
}

.headline span {
  color: var(--text);
  font-weight: 500;
}

.subline {
  font-family: 'JetBrains Mono', monospace;
  font-size: clamp(11px, 1.5vw, 13px);
  color: var(--text-dim);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 56px;
  animation: fadeUp 1s ease-out 0.7s both;
}

/* Email capture */
.capture-form {
  display: flex;
  gap: 0;
  width: 100%;
  max-width: 480px;
  margin-bottom: 32px;
  animation: fadeUp 1s ease-out 0.9s both;
}

.capture-input {
  flex: 1;
  padding: 16px 20px;
  background: var(--bg-card);
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-right: none;
  border-radius: 8px 0 0 8px;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.3s, box-shadow 0.3s;
}

.capture-input::placeholder {
  color: var(--text-dim);
  font-weight: 300;
}

.capture-input:focus {
  border-color: var(--cyan-dim);
  box-shadow: 0 0 0 3px var(--cyan-glow), inset 0 0 20px rgba(0, 180, 216, 0.03);
}

.capture-btn {
  padding: 16px 28px;
  background: var(--cyan);
  border: none;
  border-radius: 0 8px 8px 0;
  color: #000;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  white-space: nowrap;
}

.capture-btn:hover {
  background: #00c9f0;
}

.capture-btn:active {
  transform: scale(0.97);
}

/* Status message */
.status {
  font-size: 13px;
  color: var(--cyan);
  height: 20px;
  margin-bottom: 48px;
  animation: fadeUp 1s ease-out 0.9s both;
  font-family: 'JetBrains Mono', monospace;
}

/* Audience tags */
.tags {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  animation: fadeUp 1s ease-out 1.1s both;
}

.tag {
  padding: 8px 16px;
  border: 1px solid rgba(255, 255, 255, 0.06);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-dim);
  letter-spacing: 0.04em;
  background: rgba(255, 255, 255, 0.02);
  transition: border-color 0.3s, color 0.3s;
}

.tag:hover {
  border-color: var(--cyan-dim);
  color: var(--cyan);
}

/* Bottom accent line */
.bottom-line {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--cyan) 30%, var(--orange) 70%, transparent 100%);
  opacity: 0.4;
  z-index: 10;
}

/* Corner markers */
.corner {
  position: fixed;
  width: 24px;
  height: 24px;
  z-index: 10;
  opacity: 0.15;
}

.corner-tl { top: 16px; left: 16px; border-top: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
.corner-tr { top: 16px; right: 16px; border-top: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }
.corner-bl { bottom: 16px; left: 16px; border-bottom: 1px solid var(--cyan); border-left: 1px solid var(--cyan); }
.corner-br { bottom: 16px; right: 16px; border-bottom: 1px solid var(--cyan); border-right: 1px solid var(--cyan); }

/* Floating particles */
.particle {
  position: fixed;
  width: 2px;
  height: 2px;
  background: var(--cyan);
  border-radius: 50%;
  opacity: 0;
  z-index: 1;
  animation: drift 8s ease-in-out infinite;
}

.particle:nth-child(1) { left: 15%; top: 20%; animation-delay: 0s; animation-duration: 7s; }
.particle:nth-child(2) { left: 80%; top: 60%; animation-delay: 2s; animation-duration: 9s; }
.particle:nth-child(3) { left: 40%; top: 80%; animation-delay: 4s; animation-duration: 6s; }
.particle:nth-child(4) { left: 70%; top: 30%; animation-delay: 1s; animation-duration: 8s; }
.particle:nth-child(5) { left: 25%; top: 55%; animation-delay: 3s; animation-duration: 10s; }

@keyframes drift {
  0%, 100% { opacity: 0; transform: translateY(0); }
  30%, 70% { opacity: 0.3; }
  50% { opacity: 0.5; transform: translateY(-30px); }
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Mobile */
@media (max-width: 520px) {
  .capture-form { flex-direction: column; gap: 10px; }
  .capture-input { border-radius: 8px; border-right: 1px solid rgba(255, 255, 255, 0.06); }
  .capture-btn { border-radius: 8px; }
  .logo-svg { width: 260px; }
  .tags { gap: 8px; }
  .tag { font-size: 11px; padding: 6px 12px; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>
<div class="glow-orb"></div>
<div class="scanlines"></div>

<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>
<div class="particle"></div>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<main>
  <!-- Logo: BYR + Robot O -->
  <div class="logo-container">
    <svg class="logo-svg" viewBox="0 0 295 90" xmlns="http://www.w3.org/2000/svg">
      <!-- Individual letters for precise spacing -->
      <text x="0" y="72" font-family="'Outfit', sans-serif" font-size="82" font-weight="900" fill="#E8E8EC">B</text>
      <text x="55" y="72" font-family="'Outfit', sans-serif" font-size="82" font-weight="900" fill="#E8E8EC">Y</text>
      <text x="112" y="72" font-family="'Outfit', sans-serif" font-size="82" font-weight="900" fill="#E8E8EC">R</text>
      <!-- Robot O — same spacing as between other letters -->
      <g transform="translate(170, 14)">
        <rect x="0" y="0" width="58" height="58" rx="29" fill="#00B4D8"/>
        <rect x="9" y="9" width="40" height="40" rx="20" fill="#0A0A0F"/>
        <rect class="visor" x="12" y="23" width="34" height="11" rx="5.5" fill="#00B4D8"/>
        <g class="robot-eye-left" style="transform-origin: 22px 28.5px;">
          <circle cx="22" cy="28.5" r="3.5" fill="#0A0A0F"/>
        </g>
        <g class="robot-eye-right" style="transform-origin: 36px 28.5px;">
          <circle cx="36" cy="28.5" r="3.5" fill="#0A0A0F"/>
        </g>
      </g>
    </svg>
  </div>

  <h1 class="headline">
    The marketplace for <span>buying and selling robots</span>
  </h1>

  <p class="subline">Coming 2026</p>

  <div class="capture-form" id="captureForm">
    <input
      type="email"
      class="capture-input"
      id="emailInput"
      placeholder="Enter your email for early access"
      autocomplete="email"
      required
    />
    <button class="capture-btn" id="captureBtn" onclick="handleSubmit()">Get early access</button>
  </div>

  <p class="status" id="statusMsg"></p>

  <div class="tags">
    <span class="tag">Robot dealers</span>
    <span class="tag">Manufacturers</span>
    <span class="tag">System integrators</span>
    <span class="tag">Fleet operators</span>
    <span class="tag">Buyers</span>
  </div>
</main>

<div class="bottom-line"></div>

<script>
function handleSubmit() {
  const input = document.getElementById('emailInput');
  const status = document.getElementById('statusMsg');
  const btn = document.getElementById('captureBtn');
  const email = input.value.trim();

  if (!email || !email.includes('@') || !email.includes('.')) {
    status.textContent = '> invalid email address';
    status.style.color = '#E8530E';
    return;
  }

  btn.textContent = '...';
  btn.disabled = true;

  // Simulate submission (replace with actual endpoint)
  setTimeout(() => {
    input.value = '';
    status.style.color = '#00B4D8';
    status.textContent = '> you\'re on the list. we\'ll be in touch.';
    btn.textContent = 'Get early access';
    btn.disabled = false;
  }, 800);
}

// Enter key submit
document.getElementById('emailInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleSubmit();
});
</script>

</body>
</html>
